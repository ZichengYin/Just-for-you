<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>just for you</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            animation: flash 1.5s infinite alternate;
        }

        @keyframes flash {
            0%   { background-color: red; }
            33%  { background-color: blue; }
            66%  { background-color: green; }
            100% { background-color: red; }
        }

        /* 漫画集中线容器 */
        .manga-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* 单条集中线 */
        .line {
            position: absolute;
            width: 3px;
            height: 250px;
            background: linear-gradient(to top, transparent, gold);
            opacity: 0.7;
            transform-origin: bottom center;
            animation: linePulse 0.6s infinite alternate;
        }

        /* 生成12条线，均匀分布在360度 */
        .line:nth-child(1)  { transform: translate(-50%, -100%) rotate(0deg); }
        .line:nth-child(2)  { transform: translate(-50%, -100%) rotate(30deg); }
        .line:nth-child(3)  { transform: translate(-50%, -100%) rotate(60deg); }
        .line:nth-child(4)  { transform: translate(-50%, -100%) rotate(90deg); }
        .line:nth-child(5)  { transform: translate(-50%, -100%) rotate(120deg); }
        .line:nth-child(6)  { transform: translate(-50%, -100%) rotate(150deg); }
        .line:nth-child(7)  { transform: translate(-50%, -100%) rotate(180deg); }
        .line:nth-child(8)  { transform: translate(-50%, -100%) rotate(210deg); }
        .line:nth-child(9)  { transform: translate(-50%, -100%) rotate(240deg); }
        .line:nth-child(10) { transform: translate(-50%, -100%) rotate(270deg); }
        .line:nth-child(11) { transform: translate(-50%, -100%) rotate(300deg); }
        .line:nth-child(12) { transform: translate(-50%, -100%) rotate(330deg); }

        /* 第二圈，更细更短，错开角度 */
        .line:nth-child(13) { transform: translate(-50%, -100%) rotate(15deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(14) { transform: translate(-50%, -100%) rotate(45deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(15) { transform: translate(-50%, -100%) rotate(75deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(16) { transform: translate(-50%, -100%) rotate(105deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(17) { transform: translate(-50%, -100%) rotate(135deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(18) { transform: translate(-50%, -100%) rotate(165deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(19) { transform: translate(-50%, -100%) rotate(195deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(20) { transform: translate(-50%, -100%) rotate(225deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(21) { transform: translate(-50%, -100%) rotate(255deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(22) { transform: translate(-50%, -100%) rotate(285deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(23) { transform: translate(-50%, -100%) rotate(315deg); height: 180px; width: 2px; opacity: 0.5; }
        .line:nth-child(24) { transform: translate(-50%, -100%) rotate(345deg); height: 180px; width: 2px; opacity: 0.5; }

        @keyframes linePulse {
            0%   { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        /* 正中间金灿灿的文本 */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;

            font-size: 5rem;
            font-weight: 900;
            color: gold;
            text-shadow: 0 0 30px yellow, 0 0 60px orange;
            text-align: center;
            line-height: 1.6;
            
            animation: zoom 0.5s infinite alternate;
        }

        @keyframes zoom {
            0%   { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.5); }
        }

        /* 底部小字 */
        .footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            z-index: 10;

            color: gold;
            font-size: 0.9rem;
            text-shadow: 0 0 8px orange;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- 漫画集中线 -->
    <div class="manga-lines">
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div>
    </div>

    <!-- 主文字 -->
    <div class="center-text">
        热&nbsp;烈&nbsp;欢&nbsp;迎<br>
        炉&nbsp;管&nbsp;大&nbsp;王
    </div>

    <!-- 底部署名 -->
    <div class="footer">made by yoyo</div>
</body>
</html>
